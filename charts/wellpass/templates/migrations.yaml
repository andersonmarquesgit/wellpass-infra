{{- range $name, $service := .Values.services }}
{{- if and $service.enabled $service.migrationDir }}
---
apiVersion: batch/v1
kind: Job
metadata:
  name: {{ $name }}-migrate
  annotations:
    argocd.argoproj.io/hook: PreSync
    argocd.argoproj.io/hook-delete-policy: BeforeHookCreation,HookSucceeded
spec:
  backoffLimit: 2
  ttlSecondsAfterFinished: 86400
  template:
    spec:
      restartPolicy: Never
      securityContext:
        runAsNonRoot: true
        seccompProfile: { type: RuntimeDefault }
      containers:
        - name: migrate
          image: "{{ $.Values.global.migrationImage.repository }}:{{ $.Values.global.migrationImage.tag }}"
          command: ["/bin/sh", "-ec"]
          args:
            - exec /workspace/project/scripts/migrate-service.sh "$DSN" {{ $service.migrationDir | quote }}
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities: { drop: [ALL] }
          env:
            - name: DSN
              valueFrom:
                secretKeyRef: { name: {{ printf "%s-secrets" $name }}, key: DSN }
{{- end }}
{{- end }}
