{{- $web := index .Values.services "web" -}}
{{- if and $web.enabled $web.ingress.enabled }}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: web-api
  annotations:
    nginx.ingress.kubernetes.io/ssl-redirect: "false"
    nginx.ingress.kubernetes.io/use-regex: "true"
    nginx.ingress.kubernetes.io/rewrite-target: /$2
spec:
  ingressClassName: nginx
  rules:
    - host: {{ $web.ingress.host }}
      http:
        paths:
          {{- range $route := list
            (dict "path" "auth" "service" "authentication-service")
            (dict "path" "sessions" "service" "wellness-session-service")
            (dict "path" "customer" "service" "customer-service")
            (dict "path" "notifications" "service" "notification-service") }}
          - path: /api/{{ $route.path }}(/|$)(.*)
            pathType: ImplementationSpecific
            backend:
              service:
                name: {{ $route.service }}
                port:
                  number: 80
          {{- end }}
{{- end }}
