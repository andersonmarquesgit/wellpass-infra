{{- range $name, $service := .Values.services }}
{{- if $service.enabled }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ $name }}
  labels:
    app.kubernetes.io/name: {{ $name }}
    {{- include "wellpass.labels" $ | nindent 4 }}
spec:
  replicas: {{ $service.replicas | default 1 }}
  strategy:
    type: {{ $service.deploymentStrategy | default "RollingUpdate" }}
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ $name }}
  template:
    metadata:
      labels:
        app.kubernetes.io/name: {{ $name }}
        app.kubernetes.io/part-of: wellpass
    spec:
      {{- with $.Values.global.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: {{ $name }}
          image: "{{ $service.image.repository }}:{{ $service.image.tag }}"
          imagePullPolicy: {{ $.Values.global.imagePullPolicy }}
          ports:
            - name: http
              containerPort: {{ $service.port | default 80 }}
          envFrom:
            - configMapRef:
                name: {{ $name }}
            - secretRef:
                name: {{ $service.secretName | default (printf "%s-secrets" $name) }}
          readinessProbe:
            httpGet: { path: {{ $service.readinessPath | default "/readyz" }}, port: http }
            initialDelaySeconds: 3
            periodSeconds: 10
          livenessProbe:
            httpGet: { path: {{ $service.livenessPath | default "/healthz" }}, port: http }
            initialDelaySeconds: 15
            periodSeconds: 20
          resources:
            {{- toYaml $service.resources | nindent 12 }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ $name }}
  labels:
    app.kubernetes.io/name: {{ $name }}
    {{- include "wellpass.labels" $ | nindent 4 }}
spec:
  selector:
    app.kubernetes.io/name: {{ $name }}
  ports:
    - name: http
      port: 80
      targetPort: http
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ $name }}
data:
  SERVER_PORT: {{ $service.port | default 80 | quote }}
  {{- range $key, $value := $service.env }}
  {{ $key }}: {{ $value | quote }}
  {{- end }}
{{- end }}
{{- end }}
