apiVersion: argoproj.io/v1alpha1
kind: Application
metadata: { name: wellpass-non-prod-platform, namespace: argocd }
spec:
  project: default
  source:
    repoURL: https://github.com/andersonmarquesgit/wellpass-infra.git
    targetRevision: main
    path: platform/cloud/non-prod
  destination: { server: https://kubernetes.default.svc, namespace: external-secrets }
  syncPolicy: { automated: { prune: true, selfHeal: true } }
