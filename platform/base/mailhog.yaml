apiVersion: apps/v1
kind: Deployment
metadata: { name: mailhog }
spec:
  replicas: 1
  selector: { matchLabels: { app: mailhog } }
  template:
    metadata: { labels: { app: mailhog } }
    spec:
      containers:
        - name: mailhog
          image: mailhog/mailhog:v1.0.1
          ports:
            - { name: smtp, containerPort: 1025 }
            - { name: http, containerPort: 8025 }
          resources:
            requests: { cpu: 10m, memory: 32Mi }
            limits: { cpu: 250m, memory: 128Mi }
---
apiVersion: v1
kind: Service
metadata: { name: mailhog }
spec:
  selector: { app: mailhog }
  ports:
    - { name: smtp, port: 1025 }
    - { name: http, port: 8025 }

