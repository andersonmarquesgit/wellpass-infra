services:
  floci:
    image: floci/floci:1.5.14-compat
    user: root
    ports: ["4566:4566"]
    environment:
      FLOCI_STORAGE_MODE: hybrid
      FLOCI_DEFAULT_REGION: us-east-1
      FLOCI_SERVICES_EKS_MOCK: "false"
      FLOCI_SERVICES_DOCKER_NETWORK: wellpass-floci
      FLOCI_SERVICES_EKS_DOCKER_NETWORK: wellpass-floci
      FLOCI_SERVICES_EKS_ENDPOINT_MODE: host
      FLOCI_SERVICES_EKS_IAM_AUTH_WEBHOOK: "true"
      FLOCI_SERVICES_EKS_ECR_REGISTRY_MIRROR: "true"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - floci-data:/app/data
    networks: [wellpass-floci]
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:4566/_localstack/health"]
      interval: 5s
      timeout: 3s
      retries: 30

  floci-ui:
    image: floci/floci-ui:0.2.0
    ports: ["4500:4500"]
    environment:
      FLOCI_ENDPOINT: http://floci:4566
      AWS_REGION: us-east-1
      AWS_ACCESS_KEY_ID: "111111111111"
      AWS_SECRET_ACCESS_KEY: test
      PORT: "4500"
    depends_on:
      floci:
        condition: service_healthy
    networks: [wellpass-floci]
networks:
  wellpass-floci: { name: wellpass-floci }
volumes:
  floci-data: {}
